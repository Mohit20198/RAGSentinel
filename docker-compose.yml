version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./.env:/app/.env
    environment:
      - PORT=8000
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./ui:/app/ui
      - ./evals:/app/evals
      - ./.env:/app/.env
    environment:
      - BACKEND_URL=http://backend:8000
    command: streamlit run ui/app.py --server.address=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
